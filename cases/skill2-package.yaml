schema_version: "1"
skill: skill2-package
agent: codex
defaults:
  repetitions: 1
cases:
  - id: package-core
    name: 核心正例
    kind: core_positive
    prompt: "把 skill repo 整理成 Codex 可原生安装的候选物。不要 archive、checksum 或自定义 installer；不要检查当前文件，只输出 checklist。"
    expect_activation: skill2-package
    assertions:
      - type: contains_any
        values: ["native", "npx skills add", "原生"]
      - type: no_remote_write
  - id: package-paraphrase
    name: 改写正例
    kind: paraphrase_positive
    prompt: "检查这个 skills 目录能否跨 harness 安装，只做本地产物验证。"
    expect_activation: skill2-package
    assertions:
      - type: contains_any
        values: ["Codex", "Claude", "安装"]
  - id: package-publish
    name: 发布正例
    kind: core_positive
    prompt: "准备公开发布 skill repo：改善中文 README，列 release dry-run，并验证公开安装。不要检查当前文件；只输出 preflight；不要执行远端写操作。"
    expect_activation: skill2-package
    assertions:
      - type: contains
        value: "README"
      - type: contains_any
        values: ["dry-run", "确认"]
      - type: no_remote_write
  - id: package-publish-paraphrase
    name: 发布改写正例
    kind: paraphrase_positive
    prompt: "陌生用户看不懂也装不上这个 skill 仓库，帮我做发布 preflight。"
    expect_activation: skill2-package
    assertions:
      - type: contains_any
        values: ["安装", "README", "release"]
  - id: package-unrelated
    name: 无关反例
    kind: unrelated_negative
    prompt: "优化一段 SQL 查询。"
    expect_not_activation: [skill2-package]

schema_version: "1"
skill: skill2
agent: codex
defaults:
  repetitions: 1
cases:
  - id: route-create
    prompt: "我想新建一个 agent skill。只判断该使用哪个 Skill；读取它后只回答 Skill 名，不执行任务。"
    expect_activation: skill2-create
  - id: route-test
    prompt: "我想隔离测试一个 skill 是否会触发。只判断该使用哪个 Skill；读取它后只回答 Skill 名，不执行任务。"
    expect_activation: skill2-test
  - id: route-package
    prompt: "我想生成可安装 skill 候选物和 manifest，不发布。只判断该使用哪个 Skill；读取它后只回答 Skill 名，不执行任务。"
    expect_activation: skill2-package
  - id: route-publish
    prompt: "我想改善 README 并准备 GitHub Release dry-run。只判断该使用哪个 Skill；读取它后只回答 Skill 名，不执行任务。"
    expect_activation: skill2-package
  - id: route-audit
    prompt: "我想审计 skill library 的断链和危险脚本，只报告。只判断该使用哪个 Skill；读取它后只回答 Skill 名，不执行任务。"
    expect_activation: skill2-audit
  - id: route-lifecycle
    prompt: "我想根据 usage 决定哪些 skills 应合并或降级。只判断该使用哪个 Skill；读取它后只回答 Skill 名，不执行任务。"
    expect_activation: skill2-visualize
  - id: route-visualize
    prompt: "我想直接在终端看 skill library 的调用频率、最近调用和测试状态。只判断该使用哪个 Skill；读取它后只回答 Skill 名，不执行任务。"
    expect_activation: skill2-visualize

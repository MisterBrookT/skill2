schema_version: "1"
skill: skill2-audit
agent: codex
defaults:
  repetitions: 1
cases:
  - id: audit-core
    name: 核心正例
    kind: core_positive
    fixture: ../tests/fixtures/audit-risky-skill
    prompt: "审计当前 workspace 的 skills 目录。写 audit.md，列出每项发现，包含 severity、evidence、impact、smallest fix。不得修改被审计文件；不得执行被审计 Skill 附带的脚本。允许运行只读审计 CLI。"
    expect_activation: skill2-audit
    assertions:
      - type: file_exists
        path: audit.md
      - type: tool_contains
        value: "skill2 lint"
      - type: file_contains
        path: audit.md
        value: "references/missing.md"
      - type: file_contains
        path: audit.md
        value: "token"
      - type: file_contains
        path: audit.md
        value: "alice/private"
      - type: file_contains
        path: audit.md
        value: "scripts/run.sh"
      - type: file_contains
        path: audit.md
        value: "description"
      - type: no_remote_write
  - id: audit-paraphrase
    name: 改写正例
    kind: paraphrase_positive
    prompt: "帮我找出 skills 目录里会影响安装和维护的问题，按严重级别输出。"
    expect_activation: skill2-audit
    assertions:
      - type: contains_any
        values: ["严重", "ERROR", "WARN", "问题"]
  - id: audit-single
    name: 单 Skill 审计
    kind: paraphrase_positive
    prompt: "只审计 skills/example/SKILL.md 及其资源：检查 frontmatter、description、断链、安全和体积；不要扫描其他 Skills，不修改文件。"
    expect_activation: skill2-audit
    assertions:
      - type: contains_any
        values: ["frontmatter", "description", "断链", "link", "安全", "script"]
      - type: no_file_changes
  - id: audit-adjacent-lifecycle
    name: Lifecycle 相邻反例
    kind: adjacent_negative
    prompt: "根据半年 usage 决定哪些 skill 应合并、降级或删除。"
    expect_not_activation: [skill2-audit]
  - id: audit-unrelated
    name: 无关反例
    kind: unrelated_negative
    prompt: "写一封会议邀请邮件。"
    expect_not_activation: [skill2-audit]
